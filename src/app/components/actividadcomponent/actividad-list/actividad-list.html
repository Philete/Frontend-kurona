<div class="container">
  <h2>Lista de Actividades</h2>

  <ng-container *ngIf="dataSource.connect() | async as actividades">
    <div class="cards-container" *ngIf="actividades.length > 0; else sinDatos">
      <mat-card class="actividad-card" *ngFor="let element of actividades">
        <mat-card-content>
          <h3>{{ element.descripcion }}</h3>

          <p>
            <strong>Fecha Inicio:</strong>
            {{ element.fechaInicio | date: 'dd/MM/yyyy' }}
          </p>

          <p>
            <strong>Fecha Fin:</strong>
            {{ element.fechaFin | date: 'dd/MM/yyyy' }}
          </p>

          <p>
            <strong>Estado:</strong>
            {{ element.estado }}
          </p>

          <p>
            <strong>Usuario ID:</strong>
            {{ element.usuarioId }}
          </p>

          <p>
            <strong>Lote ID:</strong>
            {{ element.loteId }}
          </p>
        </mat-card-content>

        <mat-card-actions class="acciones">
          <button
            mat-button
            color="warn"
            (click)="eliminar(element.actividadid)"
          >
            <mat-icon>delete</mat-icon>
            Eliminar
          </button>

          <button
            mat-button
            color="primary"
            [routerLink]="['/actividad/actualizar-actualizar', element.actividadid]"
          >
            <mat-icon>edit</mat-icon>
            Actualizar
          </button>
        </mat-card-actions>
      </mat-card>
    </div>
  </ng-container>

  <ng-template #sinDatos>
    <p class="mensaje-vacio">No hay actividades registradas.</p>
  </ng-template>

  <mat-paginator
    [pageSize]="5"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons>
  </mat-paginator>
</div>
