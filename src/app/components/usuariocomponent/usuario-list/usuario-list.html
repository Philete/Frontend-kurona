<div class="card-container">

    <mat-card *ngFor="let usuario of pagedData" class="user-card">
      <mat-card-header>
        <mat-card-title>{{ usuario.username }}</mat-card-title>
        <mat-card-subtitle>{{ usuario.apellido }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>Email: {{ usuario.email }}</p>
        <p>Fecha Registro: {{ usuario.fechaRegistro | date:'dd/MM/yyyy' }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button color="warn" (click)="eliminar(usuario.usuario_Id)">
          <mat-icon>delete</mat-icon> Eliminar
        </button>
        <button mat-button color="primary" [routerLink]="['/usuario/actualizar-usuario', usuario.usuario_Id]">
          <mat-icon>edit</mat-icon> Actualizar
        </button>
      </mat-card-actions>
    </mat-card>
</div>

<mat-paginator [length]="dataSource.data.length"
               [pageSize]="pageSize"
               [pageSizeOptions]="[5, 10, 20]"
               (page)="onPageChange($event)"
               showFirstLastButtons>
</mat-paginator>
