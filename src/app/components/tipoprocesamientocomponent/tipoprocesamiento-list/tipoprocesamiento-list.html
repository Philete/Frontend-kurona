<div class="container">
  <div class="list-header">
    <mat-icon>category</mat-icon>
    <h2>Lista de Tipos de Procesamiento</h2>
  </div>

  <div class="search-bar">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>🔍 Buscar por nombre</mat-label>
      <input matInput [(ngModel)]="busqueda" (keyup.enter)="buscar()" placeholder="Escribe el nombre..."/>
    </mat-form-field>
    <button mat-flat-button class="btn-buscar" (click)="buscar()">Buscar</button>
    <button mat-flat-button class="btn-limpiar" (click)="busqueda = ''; cargar()">Limpiar</button>
  </div>

  <div class="cards-grid">
    <mat-card *ngFor="let e of dataSource.data | slice: (paginator.pageIndex * paginator.pageSize) : (paginator.pageIndex * paginator.pageSize) + paginator.pageSize" class="item-card">
      <mat-card-header>
        <mat-card-title>{{e.nombre}}</mat-card-title>
        <mat-card-subtitle>ID: {{e.tipoId}}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p><strong>Descripción:</strong> {{e.descripcion}}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-icon-button color="primary" (click)="editar(e.tipoId)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminar(e.tipoId)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <mat-paginator #paginator [length]="dataSource.data.length" [pageSizeOptions]="[6, 12, 24]" showFirstLastButtons></mat-paginator>

  <div *ngIf="dataSource.data.length === 0" class="empty-msg">
    No hay tipos de procesamiento registrados.
  </div>
</div>
