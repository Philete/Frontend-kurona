<div class="card-container">

    <mat-card *ngFor="let rol of pagedData" class="rol-card">
      <mat-card-header>
        <mat-card-title>{{ rol.rol }}</mat-card-title>
        <mat-card-subtitle>Permisos: {{ rol.permisos }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>Fecha creación: {{ rol.fechaCreacion | date:'dd/MM/yyyy' }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button color="warn" (click)="eliminar(rol.rolId)">
          <mat-icon>delete</mat-icon> Eliminar
        </button>
        <button mat-button color="primary" [routerLink]="['/rol/actualizar-rol', rol.rolId]">
          <mat-icon>edit</mat-icon> Actualizar
        </button>
      </mat-card-actions>
    </mat-card>
</div>

<mat-paginator [length]="dataSource.data.length"
                 [pageSize]="pageSize"
                 [pageSizeOptions]="[5, 10, 20]"
                 (page)="onPageChange($event)"
                 showFirstLastButtons>
</mat-paginator>
