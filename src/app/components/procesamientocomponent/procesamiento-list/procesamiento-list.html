<div class="container">
  <div class="list-header">
    <mat-icon>settings</mat-icon>
    <h2>Lista de Procesamientos</h2>
  </div>

  <div class="cards-grid">
    <mat-card *ngFor="let e of dataSource.data | slice: (paginator.pageIndex * paginator.pageSize) : (paginator.pageIndex * paginator.pageSize) + paginator.pageSize" class="item-card">
      <mat-card-header>
        <mat-card-title>Procesamiento #{{e.procesamientoId}}</mat-card-title>
        <mat-card-subtitle>{{e.estado}}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p><strong>Cantidad:</strong> {{e.cantidad}}</p>
        <p><strong>Cosecha:</strong> {{e.idCosecha}}</p>
        <p><strong>Tipo:</strong> {{getNombreTipo(e.tipoId)}}</p>
        <p><strong>Fecha Inicio:</strong> {{e.fechaInicio}}</p>
        <p><strong>Fecha Fin:</strong> {{e.fechaFin}}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-icon-button color="primary" (click)="editar(e.procesamientoId)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminar(e.procesamientoId)">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <mat-paginator #paginator [length]="dataSource.data.length" [pageSizeOptions]="[6, 12, 24]" showFirstLastButtons></mat-paginator>

  <div *ngIf="dataSource.data.length === 0" class="empty-msg">
    No hay procesamientos registrados.
  </div>
</div>
