<div class="container">
  <div class="form-card">
    <div class="form-header">
      <mat-icon>settings</mat-icon>
      <h2>Editar Procesamiento</h2>
    </div>

    <form [formGroup]="form" (submit)="actualizar()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Cosecha</mat-label>
        <mat-select formControlName="idCosecha">
          <mat-option *ngFor="let c of cosechas" [value]="c.idCosecha">
            Cosecha {{c.idCosecha}} - {{c.estadoCosecha}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Tipo de Procesamiento</mat-label>
        <mat-select formControlName="tipoId">
          <mat-option *ngFor="let t of tipos" [value]="t.tipoId">
            {{t.nombre}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Estado</mat-label>
        <input matInput formControlName="estado"/>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Cantidad</mat-label>
        <input matInput type="number" formControlName="cantidad"/>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Fecha Inicio</mat-label>
        <input matInput [matDatepicker]="picker1" formControlName="fechaInicio"/>
        <mat-hint>DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
        <mat-datepicker #picker1></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Fecha Fin</mat-label>
        <input matInput [matDatepicker]="picker2" formControlName="fechaFin"/>
        <mat-hint>DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker2"></mat-datepicker-toggle>
        <mat-datepicker #picker2></mat-datepicker>
      </mat-form-field>

      <div *ngIf="exito" class="success-msg">
        ✅ Procesamiento actualizado correctamente
      </div>

      <button mat-flat-button class="btn-registrar" type="submit">
        Actualizar
      </button>
    </form>
  </div>
</div>
